# wn-panel prod stack na VM 142 (Proxmox vavo).
# Usage: docker compose up -d (w katalogu z .env i docker-compose.yml)

services:
  app:
    image: ghcr.io/zmrlk/wn-panel:latest
    container_name: wn-app
    restart: unless-stopped
    env_file:
      - /opt/wn-app/.env
    ports:
      # LAN bypass (bez CF Tunnel). Dla prod-only przez CF: zakomentuj.
      - "192.168.3.142:3000:3000"
    volumes:
      - wn_uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wn-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - /opt/wn-app/.env
    depends_on:
      app:
        condition: service_healthy

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: wn-gotenberg
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-disable-web-security=true
      - --chromium-ignore-certificate-errors=true
      # Allow fetching internal app container (normalnie gotenberg blokuje RFC1918 SSRF guard).
      - --chromium-allow-list=^https?://(app|localhost):3000(/.*)?$$
      - --api-port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  wn_uploads:
    name: wn_uploads
