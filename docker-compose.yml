services:
  postgres:
    image: postgres:16-alpine
    container_name: wn-panel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wn
      POSTGRES_PASSWORD: wn_dev_local
      POSTGRES_DB: wn_panel
    ports:
      - "5432:5432"
    volumes:
      - wn_panel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wn -d wn_panel"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wn_panel_pgdata:
    name: wn_panel_pgdata
